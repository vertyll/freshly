name: Build and Publish Freshly Backend
on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - 'freshly-backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:
env:
  REGISTRY: zot.vertyll.dev
  IMAGE_NAME: vertyll/freshly-backend
jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Derive version from tag
        id: vars
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#backend-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=pr-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Zot
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./freshly-backend/Dockerfile
          platforms: linux/arm64
          push: ${{ github.ref_type == 'tag' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
