name: Build and Publish Freshly Backend

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    paths:
      - "freshly-backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: zot.vertyll.dev
  IMAGE_NAME: vertyll/freshly-backend

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Derive image version
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "version=pr-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Zot
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./freshly-backend/Dockerfile
          platforms: linux/arm64
          push: ${{ github.ref_type == 'tag' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend